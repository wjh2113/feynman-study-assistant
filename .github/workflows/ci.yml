name: CI
on:
  push:
    branches: [master, main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: zhifan_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d zhifan_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/zhifan_test
          TEST_REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:integration
      - run: docker build -t zhifan:${{ github.sha }} .
